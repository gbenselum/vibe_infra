# This file contains the necessary manifests to deploy a single-node, persistent
# HashiCorp Vault instance using the Raft storage backend.
#
# IMPORTANT: After deploying, Vault must be manually initialized and unsealed.
# 1. Exec into the vault-0 pod: `kubectl exec -it vault-0 -n my-gitops-app -- /bin/sh`
# 2. Initialize Vault: `vault operator init`
#    - Save the unseal keys and initial root token securely.
# 3. Unseal Vault using the required number of keys: `vault operator unseal <unseal_key>`
#
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
  namespace: my-gitops-app
data:
  vault.hcl: |
    ui = true
    storage "raft" {
      path = "/vault/data"
      node_id = "${HOSTNAME}"
    }
    listener "tcp" {
      address = "0.0.0.0:8200"
      tls_disable = "true"
    }
    api_addr = "http://${HOSTNAME}.vault-internal:8200"
    cluster_addr = "https://${HOSTNAME}.vault-internal:8201"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vault
  namespace: my-gitops-app
spec:
  # The serviceName must match the name of the headless service created below.
  serviceName: "vault-internal"
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:latest
          ports:
            - containerPort: 8200
              name: api
            - containerPort: 8201
              name: cluster
          env:
            # This sets the pod's hostname, which is used by the vault.hcl config.
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: vault-config
              mountPath: /vault/config/
            - name: vault-data
              mountPath: /vault/data
          # IPC_LOCK capability is required for Vault to prevent memory from being swapped to disk.
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
      volumes:
        - name: vault-config
          configMap:
            name: vault-config
  # This template creates a PersistentVolumeClaim for each pod in the StatefulSet.
  volumeClaimTemplates:
    - metadata:
        name: vault-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
# This service provides a stable endpoint for accessing the Vault API.
apiVersion: v1
kind: Service
metadata:
  name: vault-service
  namespace: my-gitops-app
spec:
  selector:
    app: vault
  ports:
    - protocol: TCP
      port: 8200
      targetPort: 8200
      name: api
---
# This headless service is required for Vault's internal clustering communication.
# The StatefulSet uses this service to create stable DNS records for each pod.
apiVersion: v1
kind: Service
metadata:
  name: vault-internal
  namespace: my-gitops-app
spec:
  # clusterIP: None makes this a headless service.
  clusterIP: None
  selector:
    app: vault
  ports:
    - name: api
      port: 8200
    - name: cluster
      port: 8201
---
# This Ingress exposes the Vault UI to the outside world.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault-ingress
  namespace: my-gitops-app
  annotations:
    # For this Ingress to work, you need an Ingress controller.
    # On Minikube, you can enable it by running: `minikube addons enable ingress`
    kubernetes.io/ingress.class: "nginx"
spec:
  rules:
    - host: "vault.example.com" # <-- IMPORTANT: Change this to your desired hostname and update your DNS or /etc/hosts file.
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault-service
                port:
                  number: 8200
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # The name of the application in Argo CD
  name: my-gitops-app
  # The namespace where Argo CD is running
  namespace: argocd
spec:
  # The project the application belongs to
  project: default
  source:
    # The URL of the repository to scan
    repoURL: 'https://github.com/your-username/your-repo.git' # <-- IMPORTANT: Change this to your repository URL
    # The path within the repository where the Kubernetes manifests are located
    path: manifests
    # The branch to track for changes
    targetRevision: install
  destination:
    # The Kubernetes cluster where the application will be deployed
    server: 'https://kubernetes.default.svc'
    # The namespace in the cluster where the application will be deployed
    namespace: my-gitops-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
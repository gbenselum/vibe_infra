apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-applications
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # The 'root' app will deploy resources to its own namespace (argocd)
  # which are the other Application manifests.
  destination:
    namespace: argocd 
    server: https://kubernetes.default.svc
  source:
    # -----------------------------------------------------------------
    # The root app should point to the directory containing the ApplicationSet
    path: argocd
    # -----------------------------------------------------------------
    repoURL: https://github.com/gbenselum/vibe_infra.git
    # -----------------------------------------------------------------
    # The user wants to deploy from the 'install' branch.
    targetRevision: install
    # -----------------------------------------------------------------
  
  # The 'sources: []' array is incorrect if you are using 'source' (singular).
  # Delete it if you are not using the 'sources' (plural) feature.
  # project: default (This is correct, assuming you use the 'default' AppProject)
  project: default
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # This is correct for the destination namespace of the child apps,
      # but the root app deploys to 'argocd', which should already exist.
      # It's safest to leave this, or use it on the child apps themselves.
      - CreateNamespace=true
